name: react_ci_test
on: workflow_dispatch
jobs:
  react_ci_test:
   runs-on: ubuntu-latest
   steps:
      - name: get code
        uses: actions/checkout@v4
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: run unit test
        run: npm test -- --watchAll=false
        env:
         CI: true
      - name: Build react App
        run: npm run build       

  
