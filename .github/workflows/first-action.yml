name: react_ci_test
on: [push, workflow_dispatch]

jobs:
  test:
   runs-on: ubuntu-latest
   steps:
      - name: get code
        uses: actions/checkout@v4
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install Dependencies
        run: npm install
      - name: run unit test
        run: npm test -- --watchAll=false
        env:
         CI: true
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v4
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm     
      - name: install dependencies
        run: npm install
      - name: build react
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with: 
          name: buildfiles
          path: |
            build
            package.json

  
