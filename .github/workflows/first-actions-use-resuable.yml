name: react_ci_test
on: push 
  
jobs:
  test:
   runs-on: ubuntu-latest
   container: node:18
   steps:
      - name: get code
        uses: actions/checkout@v4
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: run unit test
        run: npm test -- --watchAll=false
        env:
         CI: true
      - name: Build react App
        run: npm run build
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path:  build    
